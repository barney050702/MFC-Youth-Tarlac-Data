name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MFC_YOUTH_TARLAC_DATA_BASE }}
      - name: Deploy to Firebase Hosting Preview
        run: |
          npm install -g firebase-tools
          firebase hosting:channel:deploy ${{ github.head_ref }} --project mfc-youth-tarlac-data-base --non-interactive --debug
